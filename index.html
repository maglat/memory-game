<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Memory Spiel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        
        /* Animated Background */
        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .gradient-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: linear-gradient(125deg, #667eea, #764ba2, #f093fb, #f5576c, #4facfe, #00f2fe, #43e97b, #38f9d7);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            opacity: 0.8;
        }
        @keyframes gradientMove {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        /* Floating Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }
        .orb:nth-child(1) { width: 300px; height: 300px; background: radial-gradient(circle, #f093fb, transparent); top: -100px; left: -100px; animation-delay: 0s; }
        .orb:nth-child(2) { width: 250px; height: 250px; background: radial-gradient(circle, #667eea, transparent); bottom: -50px; right: -50px; animation-delay: -5s; }
        .orb:nth-child(3) { width: 200px; height: 200px; background: radial-gradient(circle, #f5576c, transparent); top: 50%; left: 50%; animation-delay: -10s; }
        .orb:nth-child(4) { width: 150px; height: 150px; background: radial-gradient(circle, #00f2fe, transparent); top: 20%; right: 10%; animation-delay: -15s; }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 50px) scale(0.9); }
        }

        h1 { 
            color: white; 
            margin-bottom: 10px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.5);
            font-size: 2.5em;
            animation: glow 3s ease-in-out infinite;
        }
        @keyframes glow { 0%, 100% { text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.5); } 50% { text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 30px rgba(255,255,255,0.8), 0 0 10px rgba(255,255,255,0.5); } }
        
        .stats {
            display: flex;
            gap: 20px;
            color: white;
            font-size: 18px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 500px;
            perspective: 1000px;
            position: relative;
            z-index: 10;
        }
        .card {
            width: 80px;
            height: 80px;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s ease, box-shadow 0.3s ease;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .card.flipped { transform: rotateY(180deg); }
        .card.matched { 
            animation: pulse 0.5s ease;
            cursor: default;
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }
        .card-front::after {
            content: '?';
            font-size: 30px;
            opacity: 0.7;
        }
        .card-back {
            background: white;
            transform: rotateY(180deg);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }
        .reset-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: white;
            color: #764ba2;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .win-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .win-content {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: slideIn 0.5s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        @keyframes pulse { 0% { transform: rotateY(180deg) scale(1); } 50% { transform: rotateY(180deg) scale(1.15); } 100% { transform: rotateY(180deg) scale(1); } }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media (max-width: 500px) {
            .card { width: 70px; height: 70px; }
            .game-board { gap: 8px; }
            h1 { font-size: 1.8em; }
        }
        
        /* Fireworks */
        .firework-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            animation: particle-explosion 1s ease-out forwards;
        }
        @keyframes particle-explosion {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkle-anim 0.8s ease-out forwards;
        }
        @keyframes sparkle-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="gradient-bg"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    
    <h1>🎮 Memory Spiel</h1>
    <div class="stats">
        <span>🕐 <span id="time">0:00</span></span>
        <span>🎯 Züge: <span id="moves">0</span></span>
        <span>🎖️ Paare: <span id="pairs">0</span>/8</span>
    </div>
    <div class="game-board" id="board"></div>
    <button class="reset-btn" onclick="resetGame()">🔄 Neues Spiel</button>
    
    <div class="win-modal" id="winModal">
        <div class="win-content">
            <h2 style="font-size: 48px; margin-bottom: 10px;">🎉</h2>
            <h2 style="color: #764ba2; margin-bottom: 20px;">Gewonnen!</h2>
            <p>Zeit: <span id="finalTime"></span></p>
            <p>Züge: <span id="finalMoves"></span></p>
            <button class="reset-btn" onclick="resetGame()" style="margin-top: 20px;">Nochmal spielen</button>
        </div>
    </div>

    <script>
        const emojis = ['🐶', '🐱', '🦁', '🦊', '🦄', '🦋', '🌸', '🌙'];
        let cards = [];
        let flipped = [];
        let moves = 0;
        let pairs = 0;
        let startTime = null;
        let timerInterval = null;
        let canFlip = true;
        const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#00ffff', '#ff00ff', '#ffffff', '#ff6600'];

        function shuffle(array) {
            return [...array].sort(() => Math.random() - 0.5);
        }

        function createCard(emoji, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.emoji = emoji;
            card.dataset.index = index;
            card.innerHTML = `
                <div class="card-face card-front"></div>
                <div class="card-face card-back">${emoji}</div>
            `;
            card.addEventListener('click', (e) => {
                flipCard(card);
                const rect = card.getBoundingClientRect();
                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2;
                card.dataset.x = x;
                card.dataset.y = y;
            });
            return card;
        }

        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.classList.add('flipped');
            flipped.push(card);

            if (flipped.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function createFirework(x, y) {
            const particleCount = 30;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework-particle';
                const angle = (Math.PI * 2 * i) / particleCount;
                const velocity = 100 + Math.random() * 100;
                const tx = Math.cos(angle) * velocity + 'px';
                const ty = Math.sin(angle) * velocity + 'px';
                particle.style.setProperty('--tx', tx);
                particle.style.setProperty('--ty', ty);
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1000);
            }
            
            // Add sparkles
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.innerHTML = '✨';
                    sparkle.style.left = (x - 20 + Math.random() * 40) + 'px';
                    sparkle.style.top = (y - 20 + Math.random() * 40) + 'px';
                    sparkle.style.fontSize = (12 + Math.random() * 20) + 'px';
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 800);
                }, i * 50);
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flipped;
            
            if (card1.dataset.emoji === card2.dataset.emoji) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    
                    // Firework effects at both card positions
                    const x1 = parseFloat(card1.dataset.x);
                    const y1 = parseFloat(card1.dataset.y);
                    const x2 = parseFloat(card2.dataset.x);
                    const y2 = parseFloat(card2.dataset.y);
                    
                    createFirework(x1, y1);
                    createFirework(x2, y2);
                    
                    pairs++;
                    document.getElementById('pairs').textContent = pairs;
                    flipped = [];
                    canFlip = true;
                    if (pairs === emojis.length) endGame();
                }, 500);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flipped = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const seconds = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('time').textContent = `${minutes}:${seconds}`;
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('finalTime').textContent = document.getElementById('time').textContent;
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('winModal').style.display = 'flex';
            
            // Celebration fireworks
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const x = window.innerWidth / 2 + (Math.random() - 0.5) * 300;
                    const y = window.innerHeight / 2 + (Math.random() - 0.5) * 100;
                    createFirework(x, y);
                }, i * 200);
            }
        }

        function resetGame() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            flipped = [];
            moves = 0;
            pairs = 0;
            canFlip = true;
            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = '0';
            document.getElementById('time').textContent = '0:00';
            document.getElementById('winModal').style.display = 'none';
            clearInterval(timerInterval);
            
            const deck = shuffle([...emojis, ...emojis]);
            deck.forEach((emoji, i) => {
                board.appendChild(createCard(emoji, i));
            });
            startTimer();
        }

        resetGame();
    </script>
</body>
</html>
